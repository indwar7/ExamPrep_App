<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Exam Tool — MCQ</title>
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --ink: #1a1d23;
    --muted: #6b7280;
    --line: #e6e8eb;
    --accent: #2f6df6;
    --accent-soft: #eaf1ff;
    --correct: #15924b;
    --correct-soft: #e7f6ee;
    --wrong: #d93025;
    --wrong-soft: #fdeceb;
    --shadow: 0 1px 2px rgba(16,24,40,.04), 0 8px 24px rgba(16,24,40,.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
    padding: 32px 16px 64px;
  }
  .shell { width: 100%; max-width: 720px; }

  header.top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
  }
  .brand { font-weight: 700; letter-spacing: -.02em; font-size: 18px; }
  .brand span { color: var(--accent); }
  .progress { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }

  .bar { height: 4px; background: var(--line); border-radius: 99px; overflow: hidden; margin-bottom: 22px; }
  .bar > i { display:block; height:100%; width:0; background: var(--accent); border-radius:99px; transition: width .35s ease; }

  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 18px; padding: 26px; box-shadow: var(--shadow);
  }
  .chips { display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 16px; }
  .chip {
    font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 99px;
    background: var(--accent-soft); color: var(--accent); text-transform: capitalize;
  }
  .chip.diff { background: #fff4e5; color: #b45309; }

  h1.q { font-size: 23px; line-height: 1.35; margin: 4px 0 22px; letter-spacing: -.01em; }

  .options { display: grid; gap: 12px; }
  .opt {
    display: flex; align-items: center; gap: 14px; width: 100%;
    text-align: left; cursor: pointer;
    background: var(--card); border: 1.5px solid var(--line);
    border-radius: 13px; padding: 15px 16px; font-size: 16px; color: var(--ink);
    transition: border-color .15s, background .15s, transform .05s;
  }
  .opt:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-soft); }
  .opt:active:not(:disabled) { transform: scale(.995); }
  .opt:disabled { cursor: default; }
  .opt .key {
    flex: 0 0 30px; height: 30px; display: grid; place-items: center;
    border-radius: 8px; background: #f1f3f5; color: var(--muted);
    font-weight: 700; font-size: 14px;
  }
  .opt.correct { border-color: var(--correct); background: var(--correct-soft); }
  .opt.correct .key { background: var(--correct); color: #fff; }
  .opt.wrong { border-color: var(--wrong); background: var(--wrong-soft); }
  .opt.wrong .key { background: var(--wrong); color: #fff; }
  .opt .mark { margin-left: auto; font-weight: 700; }
  .opt.correct .mark { color: var(--correct); }
  .opt.wrong .mark { color: var(--wrong); }

  .feedback { margin-top: 20px; }
  .verdict { font-weight: 600; font-size: 15px; margin-bottom: 12px; display:flex; align-items:center; gap:8px; }
  .verdict.ok { color: var(--correct); }
  .verdict.no { color: var(--wrong); }

  .explainer { border: 1px solid var(--line); border-radius: 14px; overflow: hidden; background: #fff; }
  .explainer .head {
    padding: 12px 16px; font-size: 13px; font-weight: 600; color: var(--muted);
    border-bottom: 1px solid var(--line); display:flex; align-items:center; gap:8px;
  }
  .explainer video { display: block; width: 100%; background: #fff; }
  .nomedia { padding: 28px 16px; text-align:center; color: var(--muted); font-size: 14px; }

  .actions { display:flex; gap: 10px; margin-top: 22px; }
  button.btn {
    font: inherit; font-weight: 600; cursor: pointer; border-radius: 11px;
    padding: 12px 18px; border: 1.5px solid var(--line); background: #fff; color: var(--ink);
    transition: background .15s, border-color .15s;
  }
  button.btn:hover { border-color: var(--accent); }
  button.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.btn.primary:hover { background: #2257d6; }
  button.btn:disabled { opacity: .4; cursor: not-allowed; }
  .spacer { flex: 1; }

  .loading, .error { text-align:center; color: var(--muted); padding: 60px 0; }
  .error { color: var(--wrong); }
</style>
</head>
<body>
  <div class="shell">
    <header class="top">
      <div class="brand">Exam<span>Tool</span></div>
      <div class="progress" id="progress"></div>
    </header>
    <div class="bar"><i id="barfill"></i></div>
    <div id="stage"><div class="loading">Loading questions…</div></div>
  </div>

<script>
const stage = document.getElementById('stage');
const progressEl = document.getElementById('progress');
const barfill = document.getElementById('barfill');

let questions = [];
let idx = 0;

init();

async function init() {
  try {
    const res = await fetch('/questions.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    questions = (await res.json()).questions || [];
    if (!questions.length) throw new Error('no questions found');
    render();
  } catch (e) {
    stage.innerHTML = `<div class="error">Could not load questions.json — ${e.message}.<br>
      Make sure you started the server from the project root:<br>
      <code>python3 -m http.server 8000</code> then open <code>/app/</code></div>`;
  }
}

function render() {
  const q = questions[idx];
  progressEl.textContent = `Question ${idx + 1} of ${questions.length}`;
  barfill.style.width = ((idx) / questions.length * 100) + '%';

  const optsHtml = Object.entries(q.options).map(([key, text]) => `
    <button class="opt" data-key="${key}">
      <span class="key">${key}</span>
      <span class="text">${escapeHtml(text)}</span>
      <span class="mark"></span>
    </button>`).join('');

  stage.innerHTML = `
    <div class="card">
      <div class="chips">
        <span class="chip">${escapeHtml(q.subject || '')}</span>
        <span class="chip">${escapeHtml((q.topic || '').replace(/_/g,' '))}</span>
        <span class="chip diff">${escapeHtml(q.difficulty || '')}</span>
      </div>
      <h1 class="q">${escapeHtml(q.question)}</h1>
      <div class="options" id="options">${optsHtml}</div>
      <div class="feedback" id="feedback"></div>
      <div class="actions">
        <button class="btn" id="retry" style="display:none">Try again</button>
        <div class="spacer"></div>
        <button class="btn primary" id="next" disabled>${idx === questions.length - 1 ? 'Finish' : 'Next →'}</button>
      </div>
    </div>`;

  stage.querySelectorAll('.opt').forEach(btn =>
    btn.addEventListener('click', () => choose(btn.dataset.key)));
  document.getElementById('next').addEventListener('click', next);
  document.getElementById('retry').addEventListener('click', render);
}

function choose(key) {
  const q = questions[idx];
  const correct = q.correct;
  const buttons = stage.querySelectorAll('.opt');
  buttons.forEach(b => {
    b.disabled = true;
    const k = b.dataset.key;
    if (k === correct) { b.classList.add('correct'); b.querySelector('.mark').textContent = '✓'; }
    if (k === key && key !== correct) { b.classList.add('wrong'); b.querySelector('.mark').textContent = '✗'; }
  });

  const fb = document.getElementById('feedback');
  document.getElementById('next').disabled = false;

  if (key === correct) {
    fb.innerHTML = `<div class="verdict ok">✓ Correct! Nicely done.</div>`;
  } else {
    document.getElementById('retry').style.display = 'inline-block';
    fb.innerHTML = `
      <div class="verdict no">✗ Not quite — here's the step-by-step explanation:</div>
      <div class="explainer">
        <div class="head">🎬 Why the answer is ${correct} &nbsp;·&nbsp; <span style="color:var(--accent)">🔊 with voice</span></div>
        <video id="vid" controls playsinline preload="auto"
               src="/output/${q.id}.mp4"></video>
      </div>`;
    const vid = document.getElementById('vid');
    vid.volume = 1.0;
    vid.muted = false;
    // We're inside the click handler, so this counts as a user gesture →
    // the browser lets us play WITH sound (autoplay attr would force-mute).
    vid.play().catch(() => {
      const overlay = document.createElement('button');
      overlay.className = 'btn primary';
      overlay.style.cssText = 'margin:12px 16px;';
      overlay.textContent = '🔊 Play explanation with sound';
      overlay.onclick = () => { vid.muted = false; vid.volume = 1.0; vid.play(); overlay.remove(); };
      vid.after(overlay);
    });
    vid.addEventListener('error', () => {
      vid.outerHTML = `<div class="nomedia">No explanation video found for
        <code>${q.id}</code>.<br>Generate it with:
        <code>python pipeline/generate.py --id ${q.id}</code></div>`;
    });
  }
}

function next() {
  if (idx < questions.length - 1) { idx++; render(); }
  else {
    barfill.style.width = '100%';
    progressEl.textContent = 'Done';
    stage.innerHTML = `<div class="card" style="text-align:center">
      <h1 class="q" style="margin:8px 0">🎉 Quiz complete</h1>
      <p style="color:var(--muted);margin:0 0 20px">You went through all ${questions.length} questions.</p>
      <button class="btn primary" onclick="idx=0;render();barfill.style.width='0'">Restart</button>
    </div>`;
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
</script>
</body>
</html>
